name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write   # for report-failure (gh issue create / comment)

env:
  IMAGE_NAME: chrisschwer/league-simulator
  CACHE_TAG: cache

jobs:
  rust-quality:
    name: Rust quality (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: league-simulator-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            league-simulator-rust/target
          # Hash Cargo.toml (Cargo.lock is gitignored — see project .gitignore).
          key: ${{ runner.os }}-cargo-${{ hashFiles('league-simulator-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

  r-lint:
    name: R lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory only — never blocks the PR
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'
          use-public-rspm: true

      - name: Install lintr
        run: install.packages('lintr', repos = 'https://cloud.r-project.org')
        shell: Rscript {0}

      - name: Lint RCode/
        run: |
          lints <- lintr::lint_dir('RCode')
          if (length(lints) > 0) {
            cat('Found', length(lints), 'lints in RCode/\n')
            print(lints)
          } else {
            cat('No lints found.\n')
          }
        shell: Rscript {0}

  image-build-and-test:
    name: Image build + in-image testthat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub (read-only for cache)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Compute image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build production image
        uses: docker/build-push-action@v7
        env:
          # Compute cache-to dynamically: empty string disables export.
          # Dependabot PRs and fork PRs don't get DOCKERHUB_TOKEN, so they
          # can read the public cache but cannot write back.
          CACHE_TO: ${{ secrets.DOCKERHUB_TOKEN != '' && format('type=registry,ref={0}:{1},mode=min', env.IMAGE_NAME, env.CACHE_TAG) || '' }}
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: ${{ env.CACHE_TO }}

      - name: Run testthat inside the image
        run: |
          mkdir -p ci-out
          # Bind-mount tests/ + scripts/ + test_packagelist.txt into the prod image.
          # scripts/ contains operator-facing tools (e.g. season_transition/cleanup.R)
          # that the test suite invokes via Rscript subprocess; they aren't in the
          # production image because they're not part of the runtime call graph.
          # Install test-only deps (full list from test_packagelist.txt) since
          # the production image only ships runtime deps from packagelist.txt.
          docker run --rm \
            -v "$PWD/tests:/app/tests:ro" \
            -v "$PWD/scripts:/app/scripts:ro" \
            -v "$PWD/test_packagelist.txt:/app/test_packagelist.txt:ro" \
            -v "$PWD/ci-out:/out" \
            -w /app \
            -e RAPIDAPI_KEY=test_key_for_ci \
            ${{ steps.meta.outputs.tag }} \
            Rscript -e 'pkgs <- readLines("test_packagelist.txt");
                        pkgs <- pkgs[!grepl("^#|^[[:space:]]*$", pkgs)];
                        pkgs <- trimws(pkgs);
                        installed <- rownames(installed.packages());
                        to_install <- setdiff(pkgs, installed);
                        if (length(to_install) > 0) {
                          install.packages(to_install, repos = "https://cloud.r-project.org");
                        }
                        options(testthat.progress.max_fails = Inf);
                        res <- testthat::test_dir("tests/testthat", stop_on_failure = FALSE, reporter = "summary");
                        df <- as.data.frame(res);
                        writeLines(capture.output(print(df)), "/out/testthat-summary.txt");
                        cat("\n--- summary ---\n");
                        cat(sprintf("FAIL=%d WARN=%d SKIP=%d PASS=%d\n",
                                    sum(df$failed > 0), sum(df$warning), sum(df$skipped), sum(df$nb)));
                        if (any(df$failed > 0)) quit(status = 1)'

      - name: Upload testthat summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testthat-summary
          path: ci-out/testthat-summary.txt
          if-no-files-found: warn

  push-image:
    name: Push image to Docker Hub
    runs-on: ubuntu-latest
    needs: [rust-quality, image-build-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # The image is rebuilt here rather than promoted from image-build-and-test
      # because mode=min cache stores only final-stage layers — a cross-job promotion
      # would need full intermediate caching (mode=max) at higher registry storage cost.
      # The Docker layer cache makes this rebuild cheap (~30s when nothing changed,
      # ~2-3 min when only Rust source changed). Hobbyist project; conscious tradeoff.
      - name: Build and push (cached from previous job)
        uses: docker/build-push-action@v7
        env:
          CACHE_TO: ${{ secrets.DOCKERHUB_TOKEN != '' && format('type=registry,ref={0}:{1},mode=min', env.IMAGE_NAME, env.CACHE_TAG) || '' }}
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: ${{ env.CACHE_TO }}

  report-failure:
    name: Open or update CI failure issue
    runs-on: ubuntu-latest
    needs: [image-build-and-test, rust-quality]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.image-build-and-test.result == 'failure' || needs.rust-quality.result == 'failure')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download testthat summary
        uses: actions/download-artifact@v8
        with:
          name: testthat-summary
          path: ci-out
        continue-on-error: true   # if no artifact, body falls back to a generic message

      - name: Open or comment on CI failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -f ci-out/testthat-summary.txt ]; then
            FAILURES=$(grep -E '^── .*Failure' ci-out/testthat-summary.txt | head -10 || true)
            [ -z "$FAILURES" ] && FAILURES=$(tail -30 ci-out/testthat-summary.txt)
          else
            FAILURES="(testthat-summary.txt artifact missing — image build may have failed before tests ran)"
          fi

          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<EOF
          testthat run failed on commit \`$SHORT_SHA\`.

          ## Failing tests

          \`\`\`
          $FAILURES
          \`\`\`

          ## Workflow run

          $RUN_URL
          EOF

          # Build issue title based on which job failed.
          if [ "${{ needs.rust-quality.result }}" = "failure" ] && [ "${{ needs.image-build-and-test.result }}" != "failure" ]; then
            TITLE="CI: rust-quality failure on main ($SHORT_SHA)"
          elif [ "${{ needs.image-build-and-test.result }}" = "failure" ] && [ "${{ needs.rust-quality.result }}" != "failure" ]; then
            TITLE="CI: testthat failure on main ($SHORT_SHA)"
          else
            TITLE="CI: failure on main ($SHORT_SHA)"
          fi

          EXISTING=$(gh issue list --label ci-failure --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Commenting on existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            echo "Opening new ci-failure issue"
            gh issue create \
              --title "$TITLE" \
              --label ci-failure \
              --body-file "$BODY_FILE"
          fi

          rm -f "$BODY_FILE"
